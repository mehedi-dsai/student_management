<div class="header">
  <h1>{{ isEditMode ? 'Edit Student' : 'Add New Student' }}</h1>
  <p>{{ isEditMode ? 'Update student information' : 'Fill in the details to create a new student' }}</p>
</div>

<div class="card">
  <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
    <div *ngIf="errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <div *ngIf="successMessage" class="alert alert-success">
      {{ successMessage }}
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name *</label>
        <input 
          type="text" 
          id="firstName" 
          formControlName="firstName"
          class="form-control"
          [class.is-invalid]="studentForm.get('firstName')?.touched && studentForm.get('firstName')?.invalid"
        />
        <div *ngIf="studentForm.get('firstName')?.touched && studentForm.get('firstName')?.invalid" class="invalid-feedback">
          {{ getFieldError('firstName') }}
        </div>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name *</label>
        <input 
          type="text" 
          id="lastName" 
          formControlName="lastName"
          class="form-control"
          [class.is-invalid]="studentForm.get('lastName')?.touched && studentForm.get('lastName')?.invalid"
        />
        <div *ngIf="studentForm.get('lastName')?.touched && studentForm.get('lastName')?.invalid" class="invalid-feedback">
          {{ getFieldError('lastName') }}
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email Address *</label>
      <input 
        type="email" 
        id="email" 
        formControlName="email"
        class="form-control"
        [class.is-invalid]="studentForm.get('email')?.touched && studentForm.get('email')?.invalid"
      />
      <div *ngIf="studentForm.get('email')?.touched && studentForm.get('email')?.invalid" class="invalid-feedback">
        {{ getFieldError('email') }}
      </div>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input 
        type="text" 
        id="phone" 
        formControlName="phone"
        class="form-control"
        placeholder="Enter phone number"
      />
    </div>

    <div class="form-group">
      <label for="dateOfBirth">Date of Birth</label>
      <input 
        type="date" 
        id="dateOfBirth" 
        formControlName="dateOfBirth"
        class="form-control"
      />
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <textarea 
        id="address" 
        formControlName="address"
        class="form-control"
        rows="3"
        placeholder="Enter address"
      ></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-success" [disabled]="loading">
        {{ loading ? 'Saving...' : (isEditMode ? 'Update Student' : 'Create Student') }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="onCancel()">
        Cancel
      </button>
    </div>
  </form>
</div>
